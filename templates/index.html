
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paytm Wallet</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f5f7fb;
            padding: 30px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #002970;
        }

        .section {
            margin-bottom: 30px;
        }

        h2 {
            margin-bottom: 10px;
            color: #00baf2;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00baf2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0095c8;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            background: #eef;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Paytm Wallet</h1>

    <!-- CREATE USER -->
    <div class="section">
        <h2>Create User</h2>

        <input type="text" id="name" placeholder="Enter Name">
        <input type="number" id="balance" placeholder="Enter Balance">

        <button onclick="createUser()">Create User</button>
    </div>


    <!-- CHECK BALANCE -->
    <div class="section">
        <h2>Check Balance</h2>

        <input type="text" id="balanceName" placeholder="Enter Username">

        <button onclick="checkBalance()">Check Balance</button>
    </div>


    <!-- SEND MONEY -->
    <div class="section">
        <h2>Send Money</h2>

        <input type="text" id="sender" placeholder="Sender Name">
        <input type="text" id="receiver" placeholder="Receiver Name">
        <input type="number" id="amount" placeholder="Amount">

        <button onclick="sendMoney()">Send Money</button>
    </div>


    <!-- TRANSACTIONS -->
   <div class="section">
    <h2>Transactions</h2>

    <button onclick="getTransactions()">
        View Transactions
    </button>
</div>

<div id="result"></div>

<script>

const API = "";


// CREATE USER
async function createUser() {

    const name = document.getElementById("name").value;
    const balance = document.getElementById("balance").value;

    const response = await fetch(`${API}/create-user`, {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            name: name,
            balance: Number(balance)
        })

    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
        JSON.stringify(data, null, 2);

    document.getElementById("name").value = "";
    document.getElementById("balance").value = "";
}


// CHECK BALANCE
async function checkBalance() {

    const name =
        document.getElementById("balanceName").value;

    const response =
        await fetch(`${API}/balance/${name}`);

    const data = await response.json();

    document.getElementById("result").innerHTML =
        JSON.stringify(data, null, 2);
}


// SEND MONEY
async function sendMoney() {

    const sender =
        document.getElementById("sender").value;

    const receiver =
        document.getElementById("receiver").value;

    const amount =
        document.getElementById("amount").value;

    const response = await fetch(`${API}/send-money`, {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            sender: sender,
            receiver: receiver,
            amount: Number(amount)
        })

    });

    const data = await response.json();

    document.getElementById("result").innerHTML =
        JSON.stringify(data, null, 2);

    document.getElementById("sender").value = "";
    document.getElementById("receiver").value = "";
    document.getElementById("amount").value = "";
}


// TRANSACTIONS
async function getTransactions() {

    const response =
        await fetch(`${API}/transactions`);

    const data = await response.json();

    document.getElementById("result").innerHTML =
        JSON.stringify(data, null, 2);
}

</script>
